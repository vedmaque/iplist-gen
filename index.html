<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>%i18n.documentTitle%</title>
    <link
      rel="icon"
      type="image/png"
      href="%BASE_URL%favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <link rel="shortcut icon" href="%BASE_URL%favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="%BASE_URL%apple-touch-icon.png"
    />
    <meta name="apple-mobile-web-app-title" content="IPList Gen" />
    <link rel="manifest" href="%BASE_URL%site.webmanifest" />
  </head>
  <body>
    <main id="app" class="shell" aria-label="%i18n.workspaceAriaLabel%">
      <section class="hero" aria-labelledby="page-title">
        <div>
          <p id="app-brand" class="eyebrow">%i18n.brand%</p>
          <h1 id="page-title">%i18n.pageTitle%</h1>
        </div>
        <div class="stats" aria-live="polite">
          <span
            ><strong id="valid-count">0</strong>
            <span id="valid-label">%i18n.statsValid%</span></span
          >
          <span
            ><strong id="invalid-count">0</strong>
            <span id="invalid-label">%i18n.statsInvalid%</span></span
          >
        </div>
      </section>

      <section class="workspace">
        <div class="input-pane">
          <div class="upload-panel">
            <div>
              <p id="input-label" class="field-label">%i18n.inputLabel%</p>
              <p id="upload-hint" class="upload-hint">%i18n.uploadHint%</p>
            </div>

            <label class="file-picker">
              <input
                id="file-input"
                type="file"
                accept=".txt,.list,text/plain"
              />
              <span id="file-picker-label">%i18n.filePicker%</span>
            </label>
          </div>

          <div id="file-summary" class="file-summary" hidden>
            <span id="file-summary-label" class="file-summary__label"
              >%i18n.fileSummaryLabel%</span
            >
            <strong id="file-name"></strong>
            <span id="file-size"></span>
          </div>
          <div id="empty-state" class="empty-state">
            <strong id="empty-state-title">%i18n.emptyStateTitle%</strong>
            <span id="empty-state-text">%i18n.emptyStateText%</span>
          </div>
        </div>

        <aside
          id="output-pane"
          class="output-pane"
          aria-label="%i18n.resultsAriaLabel%"
        >
          <div class="actions">
            <button id="download-bat" type="button">%i18n.downloadBat%</button>
            <button id="download-json" type="button">
              %i18n.downloadJson%
            </button>
            <button id="clear-button" class="secondary" type="button">
              %i18n.clearButton%
            </button>
          </div>

          <div class="report">
            <h2 id="report-heading">%i18n.reportHeading%</h2>
            <p id="status-text">%i18n.emptyStatus%</p>
            <ul
              id="invalid-list"
              class="invalid-list"
              aria-label="%i18n.invalidListAriaLabel%"
            ></ul>
          </div>
        </aside>
      </section>

      <footer id="sources" class="sources" aria-label="%i18n.sourcesLabel%">
        <span id="sources-label">%i18n.sourcesLabel%:</span>
        <a
          id="source-standard"
          href="https://www.ipdeny.com/ipblocks/data/countries/ru.zone"
          target="_blank"
          rel="noopener noreferrer"
          >%i18n.sourceStandard%</a
        >
        <span aria-hidden="true">·</span>
        <a
          id="source-aggregated"
          href="https://www.ipdeny.com/ipblocks/data/aggregated/ru-aggregated.zone"
          target="_blank"
          rel="noopener noreferrer"
          >%i18n.sourceAggregated%</a
        >
      </footer>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
