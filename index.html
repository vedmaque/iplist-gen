<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IP List Converter</title>
  </head>
  <body>
    <main id="app" class="shell">
      <section class="hero" aria-labelledby="page-title">
        <div>
          <p class="eyebrow">IP List Converter</p>
          <h1 id="page-title">CIDR в BAT и Amnezia JSON</h1>
        </div>
        <div class="stats" aria-live="polite">
          <span><strong id="valid-count">0</strong> валидных</span>
          <span><strong id="invalid-count">0</strong> пропущено</span>
        </div>
      </section>

      <section class="workspace" aria-label="Конвертер">
        <div class="input-pane">
          <div class="toolbar">
            <label class="file-picker">
              <input
                id="file-input"
                type="file"
                accept=".txt,.list,.csv,text/plain"
              />
              <span>Загрузить файл</span>
            </label>
            <button id="clear-button" class="secondary" type="button">
              Очистить
            </button>
          </div>

          <label class="field-label" for="cidr-input">Список CIDR</label>
          <div id="file-summary" class="file-summary" hidden>
            <span class="file-summary__label">Загружен файл</span>
            <strong id="file-name"></strong>
            <span id="file-size"></span>
          </div>
          <textarea
            id="cidr-input"
            spellcheck="false"
            placeholder="2.58.124.0/22&#10;2.58.212.0/24"
          ></textarea>
        </div>

        <aside class="output-pane" aria-label="Результаты">
          <div class="actions">
            <button id="download-bat" type="button">
              Скачать routes-keenetic.bat
            </button>
            <button id="download-json" type="button">
              Скачать amnezia.json
            </button>
          </div>

          <div class="report">
            <h2>Отчет</h2>
            <p id="status-text">Добавьте список CIDR для конвертации.</p>
            <ul
              id="invalid-list"
              class="invalid-list"
              aria-label="Пропущенные строки"
            ></ul>
          </div>
        </aside>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
