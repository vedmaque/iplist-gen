<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
  </head>
  <body>
    <main id="app" class="shell">
      <section class="hero" aria-labelledby="page-title">
        <div>
          <p id="app-brand" class="eyebrow"></p>
          <h1 id="page-title"></h1>
        </div>
        <div class="stats" aria-live="polite">
          <span
            ><strong id="valid-count">0</strong> <span id="valid-label"></span
          ></span>
          <span
            ><strong id="invalid-count">0</strong>
            <span id="invalid-label"></span
          ></span>
        </div>
      </section>

      <section class="workspace">
        <div class="input-pane">
          <div class="upload-panel">
            <div>
              <p id="input-label" class="field-label"></p>
              <p id="upload-hint" class="upload-hint"></p>
            </div>

            <label class="file-picker">
              <input
                id="file-input"
                type="file"
                accept=".txt,.list,text/plain"
              />
              <span id="file-picker-label"></span>
            </label>
          </div>

          <div id="file-summary" class="file-summary" hidden>
            <span id="file-summary-label" class="file-summary__label"></span>
            <strong id="file-name"></strong>
            <span id="file-size"></span>
          </div>
          <div id="empty-state" class="empty-state">
            <strong id="empty-state-title"></strong>
            <span id="empty-state-text"></span>
          </div>
        </div>

        <aside id="output-pane" class="output-pane">
          <div class="actions">
            <button id="download-bat" type="button"></button>
            <button id="download-json" type="button"></button>
            <button id="clear-button" class="secondary" type="button"></button>
          </div>

          <div class="report">
            <h2 id="report-heading"></h2>
            <p id="status-text"></p>
            <ul id="invalid-list" class="invalid-list"></ul>
          </div>
        </aside>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
